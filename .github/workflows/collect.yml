name: 선상24 좌석 데이터 수집 (PostgreSQL v2)

on:
  schedule:
    # 매일 오전 1시 KST (UTC 16:00)
    - cron: '0 16 * * *'
  workflow_dispatch:  # 수동 실행

permissions:
  contents: write   # data/latest.json 커밋 & 푸시 허용

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # asyncio 병렬 수집으로 2~3분 예상

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r scripts/requirements_pg.txt

      - name: GCP 서비스 계정 인증 설정
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: 좌석 데이터 수집 (PostgreSQL 저장)
        env:
          INSTANCE_CONNECTION_NAME: ${{ secrets.INSTANCE_CONNECTION_NAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JSON_OUTPUT_PATH: data/latest.json
        run: python scripts/collect_pg.py

      - name: JSON 데이터 파일 커밋 & 푸시 (GitHub Pages용)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "chore: 데이터 자동 갱신 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
