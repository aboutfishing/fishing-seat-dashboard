name: 좌석 데이터 수집 (선상24 + 더피싱 통합)

on:
  # ⛔ collect_2026.yml로 통합됨 — 이 워크플로우는 비활성화
  # schedule:
  #   - cron: '0 16 * * *'
  workflow_dispatch:  # 수동 실행만 허용 (디버그 전용)

permissions:
  contents: write   # data/latest.json 커밋 & 푸시 허용

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 선상24 + 더피싱 병렬 수집

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r scripts/requirements_unified.txt

      - name: GCP 서비스 계정 인증 설정
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: 좌석 데이터 수집 (선상24 + 더피싱)
        env:
          JSON_OUTPUT_PATH: data/latest.json
        run: |
          echo "수집 시작: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')"
          python scripts/collect_unified.py
          echo "수집 완료: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')"

      - name: JSON 데이터 파일 커밋 & 푸시 (GitHub Pages용)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "chore: 데이터 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push

      - name: 수집 결과 요약
        if: always()
        run: |
          echo "=== 수집 결과 ==="
          if [ -f data/latest.json ]; then
            python3 -c "
          import json
          with open('data/latest.json') as f:
              d = json.load(f)
          print(f'갱신시각: {d[\"updated_at\"]}')
          print(f'총 레코드: {d[\"row_count\"]:,}건')
          rows = d['rows']
          if rows:
              dates = sorted(set(r[4] for r in rows if r[4]))
              print(f'날짜 범위: {dates[0]} ~ {dates[-1]} ({len(dates)}일)')
              sources = {}
              for r in rows:
                  src = r[17] if len(r) > 17 else 'unknown'
                  sources[src] = sources.get(src, 0) + 1
              for src, cnt in sorted(sources.items()):
                  print(f'  {src}: {cnt:,}건')
          "
          else
            echo "data/latest.json 없음"
          fi
