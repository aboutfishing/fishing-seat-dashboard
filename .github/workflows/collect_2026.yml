name: 좌석 데이터 통합 수집 (선상24 + 더피싱)

# collect.yml 통합 — 이 워크플로우가 유일한 수집 워크플로우입니다.
# ① 매일 01:00 KST: 14일치 실시간 수집 → GCS + data/latest.json (대시보드 즉시 반영)
# ② 매일 02:00 KST: 90일치 확장 수집 → GCS (기존 날짜 스킵, 신규 날짜만 추가)
# ③ 수동 실행: days_ahead / skip_existing 파라미터로 자유롭게 수집 범위 지정

on:
  workflow_dispatch:
    inputs:
      days_ahead:
        description: '수집 기간 (일수, 기본 14일 / 올해말까지=276)'
        required: false
        default: '276'
      skip_existing:
        description: 'GCS 기존 날짜 스킵 여부 (true/false)'
        required: false
        default: 'true'
  schedule:
    # ① 매일 01:00 KST (UTC 16:00) — 14일치 실시간 수집
    - cron: '0 16 * * *'
    # ② 매일 02:00 KST (UTC 17:00) — 90일치 확장 수집 (기존 스킵)
    - cron: '0 17 * * *'

permissions:
  contents: write

jobs:
  collect:
    name: >-
      ${{ github.event_name == 'workflow_dispatch' && format('수동: {0}일 (스킵={1})', inputs.days_ahead, inputs.skip_existing) ||
          github.event.schedule == '0 16 * * *' && '자동: 14일 실시간' ||
          '자동: 90일 확장' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r scripts/requirements_unified.txt

      - name: GCP 서비스 계정 인증 설정
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: 좌석 데이터 수집
        env:
          JSON_OUTPUT_PATH: data/latest.json
          DAYS_AHEAD: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.days_ahead ||
                github.event.schedule == '0 16 * * *' && '14' || '90' }}
          SKIP_EXISTING: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.skip_existing ||
                github.event.schedule == '0 16 * * *' && 'false' || 'true' }}
        run: |
          echo "==================================================="
          echo "수집 시작: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')"
          echo "DAYS_AHEAD=${DAYS_AHEAD} / SKIP_EXISTING=${SKIP_EXISTING}"
          echo "==================================================="
          python scripts/collect_unified.py
          echo "수집 완료: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M:%S KST')"

      - name: JSON 데이터 파일 커밋 & 푸시 (GitHub Pages용)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m \
            "chore: 데이터 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push

      - name: 수집 결과 요약
        if: always()
        run: |
          echo "=== 수집 결과 ==="
          if [ -f data/latest.json ]; then
            python3 -c "
          import json
          with open('data/latest.json') as f:
              d = json.load(f)
          print(f'갱신시각: {d[\"updated_at\"]}')
          print(f'총 레코드: {d[\"row_count\"]:,}건')
          rows = d['rows']
          if rows:
              dates = sorted(set(r[4] for r in rows if r[4]))
              print(f'날짜 범위: {dates[0]} ~ {dates[-1]} ({len(dates)}일)')
              sources = {}
              af_matched = 0
              for r in rows:
                  src = r[17] if len(r) > 17 else 'unknown'
                  sources[src] = sources.get(src, 0) + 1
                  if len(r) > 16 and r[16]:
                      af_matched += 1
              for src, cnt in sorted(sources.items()):
                  print(f'  {src}: {cnt:,}건')
              pct = af_matched / len(rows) * 100 if rows else 0
              print(f'어바웃피싱 매핑: {af_matched:,}건 ({pct:.1f}%)')
          "
          else
            echo "data/latest.json 없음"
          fi
