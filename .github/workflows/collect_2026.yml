name: 어바웃피싱 2026 전체 데이터 수집

on:
  workflow_dispatch:       # 수동 실행 (오늘 밤 즉시 실행)
  schedule:
    # 매일 오전 2시 KST (UTC 17:00) — 기존 1시 수집 완료 후
    - cron: '0 17 * * *'

permissions:
  contents: write

env:
  JSON_OUTPUT_PATH: data/latest.json

jobs:
  collect_2026:
    name: 2026 전체 좌석 데이터 수집
    runs-on: ubuntu-latest
    timeout-minutes: 90     # 280+ 일치 수집 — 넉넉하게 90분

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r scripts/requirements_pg.txt
          pip install sqlalchemy  # collect_2026_full.py에서 사용

      - name: GCP 서비스 계정 인증 설정
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: 2026 전체 데이터 수집
        env:
          INSTANCE_CONNECTION_NAME: ${{ secrets.INSTANCE_CONNECTION_NAME }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JSON_OUTPUT_PATH: data/latest.json
        run: |
          echo "수집 시작: $(date +'%Y-%m-%d %H:%M:%S KST' -d '+9 hours')"
          python scripts/collect_2026_full.py
          echo "수집 완료: $(date +'%Y-%m-%d %H:%M:%S KST' -d '+9 hours')"

      - name: JSON 데이터 파일 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m \
            "chore: 2026 전체 데이터 갱신 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push

      - name: 수집 결과 요약
        if: always()
        run: |
          echo "=== 수집 결과 ==="
          if [ -f data/latest.json ]; then
            python3 -c "
          import json
          with open('data/latest.json') as f:
              d = json.load(f)
          print(f'갱신시각: {d[\"updated_at\"]}')
          print(f'총 레코드: {d[\"row_count\"]:,}건')
          rows = d['rows']
          if rows:
              dates = sorted(set(r[4] for r in rows if r[4]))
              print(f'날짜 범위: {dates[0]} ~ {dates[-1]} ({len(dates)}일)')
          "
          else
            echo "data/latest.json 없음"
          fi
