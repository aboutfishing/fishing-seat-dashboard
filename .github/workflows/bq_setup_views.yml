name: BigQuery 투자자 뷰 초기 설정 (1회 실행)

# 수동 실행 전용 — 처음 한 번만 실행하면 됩니다
on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 인증 설정
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-key.json'))['project_id'])")
          SA_EMAIL=$(python3 -c "import json; print(json.load(open('/tmp/gcp-key.json'))['client_email'])")
          echo "GCP_PROJECT=$PROJECT" >> $GITHUB_ENV
          echo "SA_EMAIL=$SA_EMAIL"   >> $GITHUB_ENV
          echo "✅ 프로젝트: $PROJECT"
          echo "✅ 서비스 계정: $SA_EMAIL"

      - name: gcloud 인증
        run: |
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ env.GCP_PROJECT }}

      - name: BigQuery Python 클라이언트 설치
        run: pip install google-cloud-bigquery --quiet

      - name: BigQuery 데이터셋 목록 확인 (디버그)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python3 - <<'PYEOF'
          from google.cloud import bigquery
          client = bigquery.Client()
          project = client.project
          print(f"✅ 프로젝트: {project}")
          print("\n── 접근 가능한 데이터셋 목록 ──")
          try:
              datasets = list(client.list_datasets())
              if datasets:
                  for d in datasets:
                      try:
                          full = client.get_dataset(d.dataset_id)
                          print(f"  {d.dataset_id}  →  location={full.location}")
                      except Exception as ex:
                          print(f"  {d.dataset_id}  →  (위치 조회 실패: {ex})")
              else:
                  print("  (데이터셋 없음 — 서비스 계정에 bigquery.datasets.list 권한이 없을 수 있음)")
          except Exception as e:
              print(f"  ❌ list_datasets 실패: {e}")
          PYEOF

      - name: BigQuery fishing 데이터셋 및 기본 테이블 생성
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python3 - <<'PYEOF'
          from google.cloud import bigquery

          LOCATION = "asia-northeast3"   # 기존 데이터셋과 동일 위치 (서울)
          client = bigquery.Client(location=LOCATION)
          project = client.project
          print(f"✅ 프로젝트: {project} / 위치: {LOCATION}")

          # 1) fishing 데이터셋 생성 (없으면)
          ds_ref = f"{project}.fishing"
          try:
              client.get_dataset("fishing")
              print("  ✅ fishing 데이터셋 이미 존재")
          except Exception:
              ds = bigquery.Dataset(ds_ref)
              ds.location = LOCATION
              ds.description = "어바웃피싱 투자자 대시보드 데이터셋"
              client.create_dataset(ds, exists_ok=True)
              print("  ✅ fishing 데이터셋 생성 완료")

          # 2) report_metrics_daily 테이블 생성 (없으면 빈 스키마로 생성)
          schema = [
              bigquery.SchemaField("date",            "DATE",    description="보고 날짜"),
              bigquery.SchemaField("gmv",             "FLOAT64", description="일간 GMV (원)"),
              bigquery.SchemaField("bookings",        "INT64",   description="예약 건수"),
              bigquery.SchemaField("sessions",        "INT64",   description="세션 수"),
              bigquery.SchemaField("cvr",             "FLOAT64", description="전환율 (%)"),
              bigquery.SchemaField("ships",           "INT64",   description="공급 선박 수 (누적)"),
              bigquery.SchemaField("members",         "INT64",   description="회원 수 (누적)"),
              bigquery.SchemaField("ad_spend_meta",   "FLOAT64", description="Meta 광고비 (원)"),
              bigquery.SchemaField("ad_spend_google", "FLOAT64", description="Google 광고비 (원)"),
              bigquery.SchemaField("ad_roas",         "FLOAT64", description="통합 ROAS"),
              bigquery.SchemaField("ad_cpa",          "FLOAT64", description="CPA (원)"),
          ]
          tbl_ref = f"{project}.fishing.report_metrics_daily"
          try:
              client.get_table(tbl_ref)
              print("  ✅ report_metrics_daily 테이블 이미 존재")
          except Exception:
              tbl = bigquery.Table(tbl_ref, schema=schema)
              tbl.time_partitioning = bigquery.TimePartitioning(
                  type_=bigquery.TimePartitioningType.DAY,
                  field="date"
              )
              tbl.description = "일간 핵심 지표 원본 테이블"
              client.create_table(tbl, exists_ok=True)
              print("  ✅ report_metrics_daily 테이블 생성 완료")

          print("\n✅ fishing 데이터셋 사전 준비 완료")
          PYEOF

      - name: BigQuery 뷰 생성 (bq_investor_setup.sql 실행)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python3 - <<'PYEOF'
          import os
          from google.cloud import bigquery
          import re

          LOCATION = "asia-northeast3"
          client = bigquery.Client(location=LOCATION)
          project = client.project
          print(f"✅ BigQuery 프로젝트: {project} / 위치: {LOCATION}")

          # SQL 파일 읽기
          with open("scripts/bq_investor_setup.sql") as f:
              sql_raw = f.read()

          # 주석 제거 후 세미콜론 기준으로 문장 분리
          sql_clean = re.sub(r'--[^\n]*', '', sql_raw)
          sql_clean = re.sub(r'\n{3,}', '\n\n', sql_clean)
          raw_stmts = sql_clean.split(';')
          statements = [s.strip() for s in raw_stmts if s.strip()]

          print(f"총 {len(statements)}개 SQL 문 실행 예정")

          for i, stmt in enumerate(statements, 1):
              first_line = stmt.strip().splitlines()[0][:80]
              print(f"\n[{i}/{len(statements)}] {first_line}...")
              try:
                  job = client.query(stmt)
                  job.result()  # 완료 대기
                  print(f"  ✅ 완료")
              except Exception as e:
                  err = str(e)
                  # 이미 존재하는 경우 경고만 출력하고 계속 진행
                  if "already exists" in err.lower():
                      print(f"  ⚠️  이미 존재 (스킵): {err[:120]}")
                  else:
                      print(f"  ❌ 오류: {err[:200]}")
                      raise

          print("\n🎉 BigQuery 뷰 설정 완료!")
          print("생성된 객체:")
          print("  - fishing.naver_shopping_ext  (외부 테이블 - Sheets)")
          print("  - fishing.v_investor_mastered (일간 마스터 뷰)")
          print("  - fishing.v_investor_monthly  (월간 집계 뷰)")
          print("  - fishing.v_investor_kpi_latest (최신 KPI 뷰)")
          PYEOF

      - name: 서비스 계정 이메일 출력 (Google Sheet 공유용)
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════"
          echo "  ⚠️  중요: 아래 이메일을 Google Sheet에 공유하세요"
          echo ""
          echo "  서비스 계정: ${{ env.SA_EMAIL }}"
          echo ""
          echo "  시트 URL:"
          echo "  https://docs.google.com/spreadsheets/d/1AGMVHBMBqNrC-HvLHz7iBAp_wk8kAGSgyPIztD-e-AM/edit"
          echo ""
          echo "  → 공유 → 뷰어로 위 이메일 추가"
          echo "══════════════════════════════════════════════════════"

      - name: 뷰 존재 검증
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          python3 - <<'PYEOF'
          from google.cloud import bigquery
          client = bigquery.Client()
          views = [
              "v_investor_mastered",
              "v_investor_monthly",
              "v_investor_kpi_latest",
          ]
          print("뷰 생성 확인:")
          all_ok = True
          for v in views:
              try:
                  tbl = client.get_table(f"fishing.{v}")
                  print(f"  ✅ fishing.{v}  ({tbl.table_type})")
              except Exception as e:
                  print(f"  ❌ fishing.{v} — {e}")
                  all_ok = False
          if all_ok:
              print("\n✅ 모든 뷰 정상 생성됨")
              print("다음 단계: '투자자 지표 내보내기' 워크플로우 실행")
          else:
              print("\n⚠️  일부 뷰 생성 실패 — 로그 확인 필요")
          PYEOF
