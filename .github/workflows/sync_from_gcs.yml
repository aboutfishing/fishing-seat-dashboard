name: GCS 데이터 → 대시보드 동기화

# collect_seat.py (Cowork 스케줄러, 매일 03:00 KST) 실행 후
# GCS의 최신 데이터를 대시보드용 latest.json으로 변환 · 업데이트합니다.

on:
  schedule:
    # 매일 05:00 KST (UTC 20:00 전날) — 수집 완료 후 여유를 두고 실행
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '수동 지정 날짜 (비워두면 최신 날짜 자동 선택, 예: 2026-03-28)'
        required: false
        default: ''
      all_dates:
        description: '모든 가용 날짜 병합 여부 (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: GCP 서비스 계정 인증
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: gcloud CLI 설치 및 인증
        uses: google-github-actions/setup-gcloud@v2
        with:
          service_account_key: ${{ secrets.GCP_CREDENTIALS }}

      - name: GCS → latest.json 변환
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          ALL_DATES: ${{ github.event.inputs.all_dates }}
        run: |
          ARGS="--bucket aboutfishing-seat-data --output data/latest.json"
          if [ "$ALL_DATES" = "true" ]; then
            ARGS="$ARGS --all-dates"
          elif [ -n "$TARGET_DATE" ]; then
            ARGS="$ARGS --date $TARGET_DATE"
          fi
          python scripts/gcs_to_dashboard.py $ARGS

      - name: JSON 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m \
            "chore: GCS 데이터 동기화 $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
