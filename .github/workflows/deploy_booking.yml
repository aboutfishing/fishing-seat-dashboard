name: booking.html & index.html 배포 (aboutfishing.kr)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'booking.html'
      - 'index_google.html'
      - 'af-agent/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 서비스 계정 인증
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-key.json'))['project_id'])")
          gcloud config set project "$PROJECT"

      - name: booking.html → GCS 업로드
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp booking.html gs://booking-redirect-aboutfishing-kr/booking.html
          echo "✅ booking.html 배포: https://aboutfishing.kr/booking.html"

      - name: index_google.html → GCS index.html 업로드
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp index_google.html gs://booking-redirect-aboutfishing-kr/index.html
          echo "✅ index.html 배포: https://aboutfishing.kr/ (Cache-Control: no-store)"

      - name: af-agent/index.html → GCS 업로드
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp af-agent/index.html gs://booking-redirect-aboutfishing-kr/af-agent/index.html
          echo "✅ af-agent 데모 배포: https://aboutfishing.kr/af-agent/"

      - name: GCS 버킷 웹사이트 기본 페이지 설정 (index.html)
        run: |
          gsutil web set -m index.html -e 404.html gs://booking-redirect-aboutfishing-kr || \
          gsutil web set -m index.html gs://booking-redirect-aboutfishing-kr
          echo "✅ 버킷 기본 페이지: index.html"

      - name: CDN 캐시 무효화 (즉시 반영)
        run: |
          gcloud compute url-maps invalidate-cdn-cache company-lb-v3 \
            --path "/*" \
            --async \
            --global
          echo "✅ CDN 캐시 무효화 요청 완료: company-lb-v3 / path=/*"

      - name: 배포 확인
        run: |
          echo "=== 배포된 파일 목록 ==="
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/booking.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/index.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/af-agent/index.html
          echo "=== 버킷 웹사이트 설정 ==="
          gsutil web get gs://booking-redirect-aboutfishing-kr
          echo "=== HTTP 응답 확인 ==="
          sleep 5
          curl -s -o /dev/null -w "aboutfishing.kr: HTTP %{http_code}\n" https://aboutfishing.kr/
