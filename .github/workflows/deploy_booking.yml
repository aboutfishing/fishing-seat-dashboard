name: booking.html & index.html 배포 (aboutfishing.kr)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'booking.html'
      - 'index_google.html'
      - 'index_kr.html'
      - 'af-agent/**'
      - 'data/stats.json'
      - 'data/investor_metrics.json'
      - 'investor/**'
      - 'dashboard/**'
      - 'images/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: GCP 서비스 계정 인증
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          PROJECT=$(python3 -c "import json; print(json.load(open('/tmp/gcp-key.json'))['project_id'])")
          gcloud config set project "$PROJECT"

      - name: booking.html → GCS 업로드
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp booking.html gs://booking-redirect-aboutfishing-kr/booking.html
          echo "✅ booking.html 배포: https://aboutfishing.kr/booking.html"

      - name: index_kr.html → GCS 업로드 (index.html, 봇감지+SEO 마스터)
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp index_kr.html gs://booking-redirect-aboutfishing-kr/index.html
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp index_kr.html gs://booking-redirect-aboutfishing-kr/index_kr.html
          echo "✅ index.html (index_kr.html) 배포 완료"

      - name: index_google.html → GCS 업로드 (index_google.html 보존)
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp index_google.html gs://booking-redirect-aboutfishing-kr/index_google.html
          echo "✅ index_google.html 보존 배포 완료"

      - name: images/ → GCS 업로드
        run: |
          gsutil -h "Content-Type:image/webp" \
                 -h "Cache-Control:public, max-age=86400" \
                 cp images/hero_girl.webp gs://booking-redirect-aboutfishing-kr/images/hero_girl.webp
          gsutil -h "Content-Type:image/svg+xml" \
                 -h "Cache-Control:public, max-age=86400" \
                 cp images/logo.svg gs://booking-redirect-aboutfishing-kr/images/logo.svg
          gsutil -h "Content-Type:image/png" \
                 -h "Cache-Control:public, max-age=86400" \
                 cp images/logo_192.png gs://booking-redirect-aboutfishing-kr/images/logo_192.png
          gsutil -h "Content-Type:image/png" \
                 -h "Cache-Control:public, max-age=86400" \
                 cp images/logo_og.png gs://booking-redirect-aboutfishing-kr/images/logo_og.png
          echo "✅ images/ 배포 완료"

      - name: af-agent/index.html → GCS 업로드
        run: |
          gsutil -h "Content-Type:text/html; charset=utf-8" \
                 -h "Cache-Control:no-store" \
                 cp af-agent/index.html gs://booking-redirect-aboutfishing-kr/af-agent/index.html
          echo "✅ af-agent 데모 배포: https://aboutfishing.kr/af-agent/"

      - name: investor/index.html → GCS 업로드 (투자자 광고성과 대시보드)
        run: |
          if [ -f investor/index.html ]; then
            gsutil -h "Content-Type:text/html; charset=utf-8" \
                   -h "Cache-Control:no-store" \
                   cp investor/index.html gs://booking-redirect-aboutfishing-kr/investor/index.html
            echo "✅ investor 대시보드 배포: https://aboutfishing.kr/investor/"
          else
            echo "⚠️ investor/index.html 없음, 스킵"
          fi

      - name: dashboard/index.html → GCS 업로드 (내부 대시보드)
        run: |
          if [ -f dashboard/index.html ]; then
            gsutil -h "Content-Type:text/html; charset=utf-8" \
                   -h "Cache-Control:no-store" \
                   cp dashboard/index.html gs://booking-redirect-aboutfishing-kr/dashboard/index.html
            echo "✅ 내부 대시보드 배포: https://aboutfishing.kr/dashboard/"
          else
            echo "⚠️ dashboard/index.html 없음, 스킵"
          fi

      - name: data/investor_metrics.json → GCS 업로드 (투자자 지표)
        run: |
          if [ -f data/investor_metrics.json ]; then
            gsutil -h "Content-Type:application/json" \
                   -h "Cache-Control:no-store" \
                   -h "Access-Control-Allow-Origin:*" \
                   cp data/investor_metrics.json gs://booking-redirect-aboutfishing-kr/data/investor_metrics.json
            echo "✅ investor_metrics.json 배포: https://aboutfishing.kr/data/investor_metrics.json"
          else
            echo "⚠️ data/investor_metrics.json 없음, 스킵"
          fi

      - name: data/stats.json → GCS 업로드 (서비스 지표)
        run: |
          if [ -f data/stats.json ]; then
            gsutil -h "Content-Type:application/json" \
                   -h "Cache-Control:no-store" \
                   -h "Access-Control-Allow-Origin:*" \
                   cp data/stats.json gs://booking-redirect-aboutfishing-kr/data/stats.json
            echo "✅ stats.json 배포: https://aboutfishing.kr/data/stats.json"
          else
            echo "⚠️ data/stats.json 없음, 스킵"
          fi

      - name: GCS 버킷 웹사이트 기본 페이지 설정 (index.html)
        run: |
          gsutil web set -m index.html -e 404.html gs://booking-redirect-aboutfishing-kr || \
          gsutil web set -m index.html gs://booking-redirect-aboutfishing-kr
          echo "✅ 버킷 기본 페이지: index.html"

      - name: CDN 캐시 무효화 (즉시 반영)
        run: |
          gcloud compute url-maps invalidate-cdn-cache company-lb-v3 \
            --path "/*" \
            --async \
            --global
          echo "✅ CDN 캐시 무효화 요청 완료: company-lb-v3 / path=/*"

      - name: 배포 확인
        run: |
          echo "=== 배포된 파일 목록 ==="
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/booking.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/index.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/index_google.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/af-agent/index.html
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/investor/index.html || echo "investor/index.html 없음"
          gsutil ls -la gs://booking-redirect-aboutfishing-kr/dashboard/index.html || echo "dashboard/index.html 없음"
          echo "=== 버킷 웹사이트 설정 ==="
          gsutil web get gs://booking-redirect-aboutfishing-kr
          echo "=== HTTP 응답 확인 ==="
          sleep 5
          curl -s -o /dev/null -w "aboutfishing.kr: HTTP %{http_code}\n" https://aboutfishing.kr/
          echo ""
          echo "=================================================="
          echo "  투자자 대시보드 (광고 성과)"
          echo "  https://aboutfishing.kr/investor/"
          echo "  내부 대시보드"
          echo "  https://aboutfishing.kr/dashboard/"
          echo "=================================================="
